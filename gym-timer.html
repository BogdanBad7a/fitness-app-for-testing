<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gym Timer</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6efe5;
        --panel: rgba(255, 251, 247, 0.88);
        --panel-border: rgba(77, 52, 36, 0.12);
        --text: #26160d;
        --muted: #715848;
        --accent: #c75b12;
        --accent-strong: #9d4207;
        --accent-soft: #f5d6bf;
        --surface: #fffdf9;
        --ok: #1f7a45;
        --danger: #a83232;
        --shadow: 0 24px 60px rgba(60, 33, 11, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Avenir Next", "Helvetica Neue", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(252, 201, 155, 0.7), transparent 30%),
          radial-gradient(circle at bottom right, rgba(255, 226, 184, 0.8), transparent 28%),
          linear-gradient(160deg, #f3e3d0 0%, #f8f1e9 44%, #efe7dc 100%);
      }

      .app-shell {
        width: min(1100px, calc(100% - 32px));
        margin: 0 auto;
        padding: 28px 0 48px;
        display: grid;
        grid-template-columns: minmax(280px, 420px) minmax(280px, 1fr);
        gap: 20px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-radius: 28px;
        padding: 24px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(16px);
      }

      .panel-header,
      .runner-topline,
      .entry-actions,
      .runner-actions {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .eyebrow {
        margin: 0 0 4px;
        font-size: 0.78rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--muted);
      }

      h1 {
        margin: 0;
        font-size: clamp(1.8rem, 3vw, 2.5rem);
      }

      .input-label,
      .format-hint,
      .message,
      .progress-text,
      .meta-label,
      .meta-value {
        margin: 0;
      }

      .input-label {
        display: block;
        margin-top: 24px;
        margin-bottom: 8px;
        font-weight: 600;
      }

      .format-hint {
        color: var(--muted);
        margin-bottom: 12px;
      }

      code {
        font-family: "SFMono-Regular", Menlo, monospace;
        font-size: 0.95em;
      }

      textarea {
        width: 100%;
        min-height: 340px;
        border: 1px solid rgba(38, 22, 13, 0.12);
        border-radius: 22px;
        padding: 16px;
        font: inherit;
        color: var(--text);
        resize: vertical;
        background: var(--surface);
        box-shadow: inset 0 1px 3px rgba(38, 22, 13, 0.05);
      }

      textarea:focus,
      button:focus {
        outline: 3px solid rgba(199, 91, 18, 0.18);
        outline-offset: 2px;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 14px 18px;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
        transition: transform 140ms ease, opacity 140ms ease, background-color 140ms ease;
      }

      button:hover:not(:disabled) {
        transform: translateY(-1px);
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.45;
      }

      .primary-button {
        background: var(--accent);
        color: #fff8f0;
      }

      .primary-button:hover:not(:disabled) {
        background: var(--accent-strong);
      }

      .secondary-button,
      .ghost-button {
        background: var(--accent-soft);
        color: var(--text);
      }

      .ghost-button {
        background: transparent;
        border: 1px solid rgba(38, 22, 13, 0.1);
      }

      .entry-actions,
      .runner-actions {
        margin-top: 16px;
      }

      .entry-actions button,
      .runner-actions button {
        flex: 1;
      }

      .message {
        min-height: 24px;
        margin-top: 14px;
        color: var(--muted);
      }

      .message.error {
        color: var(--danger);
      }

      .message.success {
        color: var(--ok);
      }

      .panel-runner {
        display: flex;
        flex-direction: column;
      }

      .progress-text {
        color: var(--muted);
        text-align: right;
      }

      .workout-card {
        margin-top: 20px;
        flex: 1;
        min-height: 420px;
        border-radius: 28px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.92), rgba(251, 240, 230, 0.92));
        border: 1px solid rgba(38, 22, 13, 0.08);
        padding: 28px;
        display: grid;
        gap: 18px;
        align-content: start;
      }

      .workout-card.empty {
        place-items: center;
        align-content: center;
      }

      .empty-state {
        max-width: 24ch;
        text-align: center;
        color: var(--muted);
        font-size: 1.05rem;
      }

      .exercise-name {
        margin: 0;
        font-size: clamp(2rem, 4vw, 3.2rem);
        line-height: 0.98;
      }

      .status-pill {
        justify-self: start;
        padding: 10px 14px;
        border-radius: 999px;
        background: rgba(199, 91, 18, 0.12);
        color: var(--accent-strong);
        font-weight: 700;
      }

      .status-pill.resting {
        background: rgba(31, 122, 69, 0.12);
        color: var(--ok);
      }

      .metrics {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
      }

      .metric {
        padding: 16px;
        border-radius: 22px;
        background: var(--surface);
        border: 1px solid rgba(38, 22, 13, 0.08);
      }

      .meta-label {
        color: var(--muted);
        margin-bottom: 6px;
      }

      .meta-value {
        font-size: clamp(1.2rem, 3vw, 1.8rem);
        font-weight: 700;
      }

      .up-next {
        padding: 16px;
        border-radius: 22px;
        background: rgba(38, 22, 13, 0.04);
        color: var(--muted);
      }

      @media (max-width: 840px) {
        .app-shell {
          width: min(100% - 20px, 720px);
          padding-top: 18px;
          grid-template-columns: 1fr;
        }

        .panel {
          padding: 20px;
          border-radius: 24px;
        }

        textarea {
          min-height: 220px;
        }

        .metrics {
          grid-template-columns: 1fr;
        }

        .panel-header,
        .runner-topline,
        .entry-actions,
        .runner-actions {
          flex-direction: column;
          align-items: stretch;
        }

        .progress-text {
          text-align: left;
        }
      }
    </style>
  </head>
  <body>
    <main class="app-shell">
      <section class="panel panel-entry">
        <div class="panel-header">
          <div>
            <p class="eyebrow">Today's Workout</p>
            <h1>Paste and load</h1>
          </div>
          <button id="clear-workout" class="ghost-button" type="button">Reset</button>
        </div>

        <label class="input-label" for="workout-input">Accepted format</label>
        <p class="format-hint">One line per exercise: <code>Exercise Name | Sets | Reps | RestSeconds</code></p>
        <textarea
          id="workout-input"
          spellcheck="false"
          placeholder="Barbell Bench Press | 4 | 8 | 90&#10;Incline Dumbbell Press | 3 | 10 | 75&#10;Cable Fly | 3 | 12 | 60"
        ></textarea>

        <div class="entry-actions">
          <button id="load-workout" class="primary-button" type="button">Load Workout</button>
          <button id="load-sample" class="secondary-button" type="button">Sample</button>
        </div>

        <p id="message" class="message" role="status" aria-live="polite"></p>
      </section>

      <section class="panel panel-runner">
        <div class="runner-topline">
          <p class="eyebrow">Workout Runner</p>
          <p id="progress-text" class="progress-text">No workout loaded</p>
        </div>

        <div id="workout-card" class="workout-card empty">
          <p class="empty-state">Load a workout to start moving through sets.</p>
        </div>

        <div class="runner-actions">
          <button id="complete-set" class="primary-button" type="button" disabled>Set Done</button>
          <button id="skip-rest" class="secondary-button" type="button" disabled>Skip Rest</button>
        </div>
      </section>
    </main>

    <script>
      const STORAGE_KEY = "gym-timer-state-v1";
      const SAMPLE_WORKOUT = `Barbell Bench Press | 4 | 8 | 90
Incline Dumbbell Press | 3 | 10 | 75
Cable Fly | 3 | 12 | 60`;

      const input = document.querySelector("#workout-input");
      const message = document.querySelector("#message");
      const workoutCard = document.querySelector("#workout-card");
      const progressText = document.querySelector("#progress-text");
      const loadWorkoutButton = document.querySelector("#load-workout");
      const loadSampleButton = document.querySelector("#load-sample");
      const clearWorkoutButton = document.querySelector("#clear-workout");
      const completeSetButton = document.querySelector("#complete-set");
      const skipRestButton = document.querySelector("#skip-rest");

      let state = loadStoredState();
      let countdownInterval = null;

      if (!state.rawInput) {
        input.value = SAMPLE_WORKOUT;
      } else {
        input.value = state.rawInput;
      }

      render();
      syncTimer();

      loadWorkoutButton.addEventListener("click", () => {
        try {
          const exercises = parseWorkout(input.value);
          state = createSessionState(exercises, input.value);
          saveState();
          setMessage(`Loaded ${exercises.length} exercise${exercises.length === 1 ? "" : "s"}.`, "success");
          render();
          syncTimer();
        } catch (error) {
          setMessage(error.message, "error");
        }
      });

      loadSampleButton.addEventListener("click", () => {
        input.value = SAMPLE_WORKOUT;
        setMessage("Sample workout inserted.", "success");
      });

      clearWorkoutButton.addEventListener("click", () => {
        stopCountdown();
        state = defaultState();
        input.value = SAMPLE_WORKOUT;
        saveState();
        setMessage("Workout reset.", "success");
        render();
      });

      completeSetButton.addEventListener("click", () => {
        if (!hasWorkoutLoaded() || state.mode === "rest") {
          return;
        }

        const currentExercise = state.exercises[state.exerciseIndex];
        const isLastSetInExercise = state.setIndex === currentExercise.sets - 1;
        const isLastExercise = state.exerciseIndex === state.exercises.length - 1;

        if (isLastSetInExercise && isLastExercise) {
          stopCountdown();
          state.mode = "done";
          state.completedAt = Date.now();
          saveState();
          setMessage("Workout complete.", "success");
          render();
          return;
        }

        state.mode = "rest";
        state.restEndsAt = Date.now() + currentExercise.restSeconds * 1000;
        saveState();
        setMessage(`Rest started for ${currentExercise.restSeconds} seconds.`, "success");
        render();
        syncTimer();
      });

      skipRestButton.addEventListener("click", () => {
        if (!hasWorkoutLoaded()) {
          return;
        }

        if (state.mode === "rest") {
          advanceAfterRest();
          setMessage("Rest skipped.", "success");
          return;
        }

        if (state.mode === "done") {
          state = defaultState();
          input.value = SAMPLE_WORKOUT;
          saveState();
          setMessage("Ready for a new workout.", "success");
          render();
        }
      });

      document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "visible") {
          syncTimer();
          render();
        }
      });

      function defaultState() {
        return {
          rawInput: "",
          exercises: [],
          exerciseIndex: 0,
          setIndex: 0,
          mode: "idle",
          restEndsAt: null,
          completedAt: null
        };
      }

      function createSessionState(exercises, rawInput) {
        return {
          rawInput,
          exercises,
          exerciseIndex: 0,
          setIndex: 0,
          mode: "active",
          restEndsAt: null,
          completedAt: null
        };
      }

      function parseWorkout(rawText) {
        const lines = rawText
          .split("\n")
          .map((line) => line.trim())
          .filter(Boolean);

        if (lines.length === 0) {
          throw new Error("Paste at least one exercise line.");
        }

        return lines.map((line, index) => {
          const parts = line.split("|").map((part) => part.trim());

          if (parts.length !== 4) {
            throw new Error(`Line ${index + 1} must have exactly 4 parts separated by "|".`);
          }

          const [name, setsRaw, repsRaw, restRaw] = parts;
          const sets = Number.parseInt(setsRaw, 10);
          const reps = Number.parseInt(repsRaw, 10);
          const restSeconds = Number.parseInt(restRaw, 10);

          if (!name) {
            throw new Error(`Line ${index + 1} is missing the exercise name.`);
          }

          if (!Number.isInteger(sets) || sets <= 0) {
            throw new Error(`Line ${index + 1} has an invalid sets value.`);
          }

          if (!Number.isInteger(reps) || reps <= 0) {
            throw new Error(`Line ${index + 1} has an invalid reps value.`);
          }

          if (!Number.isInteger(restSeconds) || restSeconds < 0) {
            throw new Error(`Line ${index + 1} has an invalid rest value.`);
          }

          return { name, sets, reps, restSeconds };
        });
      }

      function render() {
        if (!hasWorkoutLoaded()) {
          progressText.textContent = "No workout loaded";
          workoutCard.className = "workout-card empty";
          workoutCard.innerHTML = '<p class="empty-state">Load a workout to start moving through sets.</p>';
          completeSetButton.disabled = true;
          skipRestButton.disabled = true;
          skipRestButton.textContent = "Skip Rest";
          return;
        }

        if (state.mode === "done") {
          progressText.textContent = `${state.exercises.length} exercises finished`;
          workoutCard.className = "workout-card";
          workoutCard.innerHTML = `
            <div class="status-pill resting">Workout complete</div>
            <h2 class="exercise-name">Done.</h2>
            <div class="up-next">You finished every set in this session.</div>
          `;
          completeSetButton.disabled = true;
          skipRestButton.disabled = false;
          skipRestButton.textContent = "New Workout";
          return;
        }

        const exercise = state.exercises[state.exerciseIndex];
        const setNumber = state.setIndex + 1;
        const totalSets = exercise.sets;
        const totalExercises = state.exercises.length;
        const exerciseNumber = state.exerciseIndex + 1;
        const isResting = state.mode === "rest";
        const restRemaining = isResting ? getRestRemainingSeconds() : exercise.restSeconds;

        progressText.textContent = `Exercise ${exerciseNumber}/${totalExercises}`;
        workoutCard.className = "workout-card";
        workoutCard.innerHTML = `
          <div class="status-pill ${isResting ? "resting" : ""}">
            ${isResting ? "Resting" : "Lift"}
          </div>
          <h2 class="exercise-name">${escapeHtml(exercise.name)}</h2>
          <div class="metrics">
            <div class="metric">
              <p class="meta-label">Set</p>
              <p class="meta-value">${setNumber} / ${totalSets}</p>
            </div>
            <div class="metric">
              <p class="meta-label">Reps</p>
              <p class="meta-value">${exercise.reps}</p>
            </div>
            <div class="metric">
              <p class="meta-label">${isResting ? "Rest left" : "Rest after set"}</p>
              <p class="meta-value">${formatSeconds(restRemaining)}</p>
            </div>
          </div>
          <div class="up-next">${buildNextText()}</div>
        `;

        completeSetButton.disabled = isResting;
        skipRestButton.disabled = false;
        skipRestButton.textContent = isResting ? "Skip Rest" : "Skip Exercise Rest";
      }

      function buildNextText() {
        const exercise = state.exercises[state.exerciseIndex];
        const nextSetIndex = state.setIndex + 1;

        if (nextSetIndex < exercise.sets) {
          return `Up next: ${exercise.name}, set ${nextSetIndex + 1} of ${exercise.sets}.`;
        }

        if (state.exerciseIndex + 1 < state.exercises.length) {
          const nextExercise = state.exercises[state.exerciseIndex + 1];
          return `Up next: ${nextExercise.name}, set 1 of ${nextExercise.sets}.`;
        }

        return "Up next: workout complete.";
      }

      function syncTimer() {
        stopCountdown();

        if (state.mode !== "rest") {
          return;
        }

        const tick = () => {
          if (getRestRemainingSeconds() <= 0) {
            advanceAfterRest();
            return;
          }

          render();
        };

        tick();
        countdownInterval = window.setInterval(tick, 250);
      }

      function advanceAfterRest() {
        stopCountdown();

        const currentExercise = state.exercises[state.exerciseIndex];
        const hasAnotherSet = state.setIndex + 1 < currentExercise.sets;

        if (hasAnotherSet) {
          state.setIndex += 1;
        } else {
          state.exerciseIndex += 1;
          state.setIndex = 0;
        }

        state.mode = "active";
        state.restEndsAt = null;
        saveState();
        playAlert();
        render();
      }

      function getRestRemainingSeconds() {
        if (!state.restEndsAt) {
          return 0;
        }

        return Math.max(0, Math.ceil((state.restEndsAt - Date.now()) / 1000));
      }

      function formatSeconds(seconds) {
        const minutes = Math.floor(seconds / 60);
        const remainder = seconds % 60;
        return `${minutes}:${String(remainder).padStart(2, "0")}`;
      }

      function hasWorkoutLoaded() {
        return state.exercises.length > 0;
      }

      function setMessage(text, type = "") {
        message.textContent = text;
        message.className = type ? `message ${type}` : "message";
      }

      function loadStoredState() {
        try {
          const raw = window.localStorage.getItem(STORAGE_KEY);
          if (!raw) {
            return defaultState();
          }

          const parsed = JSON.parse(raw);
          return {
            ...defaultState(),
            ...parsed
          };
        } catch {
          return defaultState();
        }
      }

      function saveState() {
        window.localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      }

      function stopCountdown() {
        if (countdownInterval) {
          window.clearInterval(countdownInterval);
          countdownInterval = null;
        }
      }

      function playAlert() {
        if ("vibrate" in navigator) {
          navigator.vibrate([120, 60, 120]);
        }

        try {
          const AudioContextClass = window.AudioContext || window.webkitAudioContext;
          if (!AudioContextClass) {
            return;
          }

          const context = new AudioContextClass();
          const oscillator = context.createOscillator();
          const gain = context.createGain();

          oscillator.type = "sine";
          oscillator.frequency.value = 880;
          gain.gain.setValueAtTime(0.0001, context.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.2, context.currentTime + 0.02);
          gain.gain.exponentialRampToValueAtTime(0.0001, context.currentTime + 0.35);

          oscillator.connect(gain);
          gain.connect(context.destination);
          oscillator.start();
          oscillator.stop(context.currentTime + 0.35);
          oscillator.onended = () => context.close();
        } catch {
          // Ignore audio failures; the app still advances state correctly.
        }
      }

      function escapeHtml(value) {
        return value
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }
    </script>
  </body>
</html>
